        run: echo "version=$(grep 'WFWEB_VERSION' wfweb.pro | grep -oP '[\d.]+')" >> $GITHUB_OUTPUT

      - name: Build .deb
        run: |
          VERSION=${{ steps.version.outputs.version }}
          DEB_ROOT=$(pwd)/deb-build/wfweb_${VERSION}_${{ matrix.deb_arch }}

          make install INSTALL_ROOT=${DEB_ROOT}

